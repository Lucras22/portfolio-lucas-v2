<section id="contato" class="contact-section">
  <div class="container-fluid contact-container" @fadeInUp>
    <div class="section-title">
      <span>05.</span>
      <h2 class="highlight">Contato</h2>
      <div class="line"></div>
    </div>

    <div class="contact-grid-wrapper">
      
      <div class="contact-column">
        <div class="tech-card h-100">
          <div class="terminal-header">
            <span class="status-dot"></span>
            <span class="terminal-title">INFO_INPUT</span>
          </div>

          <div class="contact-header mb-4">
            <h3 class="highlight">Vamos construir o futuro?</h3>
            <p class="text-gray">Seja para um projeto de automação ou freelas de IoT, estou à disposição.</p>
          </div>

          <div class="info-grid">
            <div class="info-block">
              <h4><i class="bi bi-geo-alt"></i> Localização</h4>
              <p>Boa Viagem, CE</p>
            </div>
            <div class="info-block">
              <h4><i class="bi bi-envelope"></i> Email</h4>
              <p><a href="mailto:devlucasgalindo@gmail.com">devlucasgalindo&#64;gmail.com</a></p>
            </div>
          </div>
          
          <div class="info-block mb-4">
            <h4><i class="bi bi-whatsapp"></i> WhatsApp</h4>
            <p><a [href]="whatsappUrl" target="_blank" class="wa-link">+55 88 8109-2374</a></p>
          </div>

          <div class="map-wrapper mt-auto">
            <iframe 
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15881.0123456789!2d-39.73!3d-5.12!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNcKwMDcnMTIuMCJTIDM5wrA0Myc0OC4wIlc!5e0!3m2!1spt-BR!2sbr!4v1234567890" 
              width="100%" height="140" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
          </div>
        </div>
      </div>

      <div class="tech-bridge">
        <div class="bridge-line"></div>
        <div class="bridge-node"></div>
      </div>

      <div class="contact-column">
        <div class="tech-card h-100">
          <div class="terminal-header">
            <span class="status-dot"></span>
            <span class="terminal-title">MESSAGE_SEND</span>
          </div>

          <form #contactForm="ngForm" (ngSubmit)="onSubmit(contactForm)" class="row g-3">
            <div class="col-12">
              <label class="form-label">Identificação</label>
              <input type="text" name="name" ngModel class="tech-input" placeholder="Seu nome" required>
            </div>
            <div class="col-12">
              <label class="form-label">Canal de Resposta</label>
              <input type="email" name="email" ngModel class="tech-input" placeholder="Seu e-mail" required>
            </div>
            <div class="col-12">
              <label class="form-label">Mensagem do Sistema</label>
              <textarea name="message" ngModel class="tech-input" rows="6" placeholder="Descreva sua demanda..." required></textarea>
            </div>
          
            <div class="col-12 d-flex justify-content-end mt-auto pt-3">
              <button type="submit" class="tech-btn w-100" [disabled]="isSending() || !contactForm.valid">
                @if (isSending()) {
                  <span class="spinner-border spinner-border-sm"></span>
                } @else {
                  EXECUTAR ENVIO <i class="bi bi-terminal ms-2"></i>
                }
              </button>
            </div>
          </form>                          
        </div>
      </div>

    </div>
  </div>
</section>
