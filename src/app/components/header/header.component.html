<button class="menu-mobile" (click)="toggleMenu()" [class.active]="isMenuOpen()">
  <i class="bi" [class.bi-list]="!isMenuOpen()" [class.bi-x]="isMenuOpen()"></i>
</button>

<aside id="header" [class.show]="isMenuOpen()">
  <section class="profile">
    <div class="profile-img-container">
      <img src="assets/lucas.jpeg" alt="Lucas Galindo">
    </div>
    <h1>Lucas Galindo</h1>
    
    <div class="social-links">
      <a target="_blank" href="https://linktr.ee/lucras22" title="LinkedIn">
        <i class="bi bi-linkedin"></i>
      </a>
      <a target="_blank" href="https://github.com/Lucras22" title="GitHub">
        <i class="bi bi-github"></i>
      </a>
      <a target="_blank" href="https://www.youtube.com/@DEVLucasGalindo" title="YouTube">
        <i class="bi bi-youtube"></i>
      </a>
      <a target="_blank" href="https://instagram.com/lucras_galindo" title="Instagram">
        <i class="bi bi-instagram"></i>
      </a>
    </div>
  </section>

  <nav class="nav-menu">
    <ul>
      <li><a href="#inicio" (click)="closeMenu()"><i class="bi bi-house"></i> Início</a></li>
      <li><a href="#sobre" (click)="closeMenu()"><i class="bi bi-person-vcard"></i> Sobre</a></li>
      <li><a href="#genesis" (click)="closeMenu()"><i class="bi bi-rocket-takeoff"></i> Genesis HiTech</a></li>
      <li><a href="#habilidades" (click)="closeMenu()"><i class="bi bi-list-task"></i> Habilidades</a></li>
      <li><a href="#portfolio" (click)="closeMenu()"><i class="bi bi-collection"></i> Portfólio</a></li>
      <li><a href="#contato" (click)="closeMenu()"><i class="bi bi-envelope"></i> Contato</a></li>
    </ul>
  </nav>

  <footer class="header-footer">
    <small>© 2026 Genesis HiTech</small>
  </footer>
</aside>

@if (isMenuOpen()) {
  <div class="menu-overlay" (click)="toggleMenu()"></div>
}
